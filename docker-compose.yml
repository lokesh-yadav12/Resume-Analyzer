version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: career-boost-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: career_boost_ai
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - career-boost-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: career-boost-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - career-boost-network

  # ML Service (Python/Flask)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: career-boost-ml
    restart: unless-stopped
    environment:
      PORT: 5001
      FLASK_ENV: production
    ports:
      - "5001:5001"
    networks:
      - career-boost-network
    depends_on:
      - mongodb

  # Backend API (Node.js/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career-boost-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/career_boost_ai?authSource=admin
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:5001
      JWT_SECRET: your-production-secret-key-change-this
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - career-boost-network
    depends_on:
      - mongodb
      - redis
      - ml-service

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: career-boost-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    networks:
      - career-boost-network
    depends_on:
      - backend

networks:
  career-boost-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
